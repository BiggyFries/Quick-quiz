<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Five Rooms: Temple of the Sun</title>
  <style>
    :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100dvh; display: grid; place-items: center; overflow: hidden; background: #f7f3eb; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
    canvas { display: block; width: min(100vw, calc(100dvh * 2 / 3), 600px); height: auto; max-height: 100dvh; aspect-ratio: 2 / 3; background: #f7f3eb; box-shadow: 0 24px 70px #0007; touch-action: none; }
    @media (max-width: 700px) { body { place-items: start center; } canvas { width: min(100vw, calc(100dvh * 2 / 3)); } }
  </style>
</head>
<body>
<canvas id="game" width="600" height="900" aria-label="Five Rooms: Temple of the Sun"></canvas>
<script>
(() => {
  'use strict';
  const canvas = document.querySelector('#game');
  const ctx = canvas.getContext('2d');
  const W = 600, H = 900;
  const COLORS = { ink:'#17202a', cream:'#f7f3eb', paper:'#fffdfa', sand:'#e8c67a', gold:'#efb643', coral:'#eb6b57', teal:'#2f9c8f', blue:'#5479c7', plum:'#7561a8', pale:'#e8e1d7', green:'#5dbb87', red:'#d84b4b' };
  const DAY = { id:'day-001-ancient-temple-v2', title:'TEMPLE OF THE SUN', subtitle:'The Eclipse Trial', order:['logic','memory','trivia','platformer','finale'] };
  const META = {
    logic:{name:'Bridge of Idols',kicker:'Logic seal',color:COLORS.coral,brief:'Use the three clues to place four temple idols in the correct order.'},
    memory:{name:'Chamber of Echoes',kicker:'Memory seal',color:COLORS.plum,brief:'Watch two rune sequences, then repeat each one. You may replay each sequence once.'},
    trivia:{name:'Archive of Glyphs',kicker:'Trivia seal',color:COLORS.teal,brief:'Answer four approachable questions about the ancient world. One wrong answer ends the run.'},
    platformer:{name:'Boulder Passage',kicker:'Agility seal',color:COLORS.coral,brief:'Your explorer runs automatically for 30 seconds. Use one button to jump over every obstacle.'},
    finale:{name:'Sunstone Vault',kicker:'Final seal',color:COLORS.gold,brief:'Combine knowledge, logic, memory, and timing to awaken the Sunstone.'}
  };
  const IDOLS = {
    logic:{name:'Falcon of Order',color:COLORS.coral},memory:{name:'Echo Serpent',color:COLORS.plum},trivia:{name:'Owl of Knowledge',color:COLORS.teal},platformer:{name:'Jaguar of Motion',color:COLORS.coral},finale:{name:'Sunstone',color:COLORS.gold}
  };
  const INFO = {
    logic:['Place the idols from left to right.','SUN is immediately before SERPENT.','SERPENT is left of JAGUAR.','OWL is somewhere after JAGUAR.'],
    memory:['Watch each rune pulse in order.','Repeat two complete sequences.','You may replay each sequence once.'],
    trivia:['Answer four ancient-world questions.','One incorrect answer ends this run.','The progress bar fills after each answer.'],
    platformer:['The explorer runs automatically.','Tap JUMP shortly before each obstacle.','Survive the passage for 30 seconds.'],
    finale:['Every earlier trial matters here.','Complete knowledge, order, memory, and timing.','The Sunstone must be tapped at the right moment.']
  };
  const ICONS = ['☀','〰','◆','▲'];
  const NAMES = ['SUN','SERPENT','JAGUAR','OWL'];
  const memoryRounds = [[0,2,1,3],[0,2,1,3,2,0]];
  const trivia = [
    {q:'Which material did ancient Egyptians use as writing paper?',a:['Marble','Papyrus','Silk','Bamboo'],correct:1},
    {q:'Which river was central to ancient Egyptian life?',a:['Nile','Amazon','Thames','Danube'],correct:0},
    {q:'What shape is the base of the Great Pyramid?',a:['Triangle','Circle','Square','Hexagon'],correct:2},
    {q:'Which object helped scholars decode Egyptian hieroglyphs?',a:['Dead Sea Scrolls','Antikythera Mechanism','Terracotta Army','Rosetta Stone'],correct:3}
  ];
  const obstacleTimes = [2500,5500,8500,11500,14500,17500,20500,23500,26500];
  const state = {
    mode:'start', clock:0, modeStarted:0, roomIndex:0, score:0, attempt:1, official:true, results:[], message:'', detail:'',
    character:{anim:'idle',animStarted:0}, logic:{selected:[]}, memory:{round:0,phase:'show',phaseStarted:0,input:[],replayUsed:false},
    trivia:{index:0,selected:-1}, platformer:{phase:'countdown',countdownStarted:0,runStarted:0,jumpStarted:-1,checked:[],distance:0},
    finale:{phase:'question',selected:[],input:[],readyAt:0,activeAt:0}, infoOpen:false, testing:false, stats:{}, reducedMotion:matchMedia('(prefers-reduced-motion: reduce)').matches
  };
  let manualTime = false;

  function loadStats(){try{return JSON.parse(localStorage.getItem('fiveRoomsPortraitStats')||'{}')}catch{return{}}}
  function saveRun(completed){const p=loadStats();const n={best:Math.max(p.best||0,state.score),attempts:(p.attempts||0)+1,completed:Boolean(p.completed||completed)};localStorage.setItem('fiveRoomsPortraitStats',JSON.stringify(n));state.stats=n}
  function elapsed(start){return state.clock-start}
  function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
  function rounded(x,y,w,h,r,fill,stroke=null,line=2){ctx.beginPath();ctx.roundRect(x,y,w,h,r);ctx.fillStyle=fill;ctx.fill();if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=line;ctx.stroke()}}
  function line(x1,y1,x2,y2,color,width=2){ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.strokeStyle=color;ctx.lineWidth=width;ctx.stroke()}
  function text(v,x,y,size,color=COLORS.ink,align='left',weight=700){ctx.font=`${weight} ${size}px Inter, ui-sans-serif, system-ui, sans-serif`;ctx.textAlign=align;ctx.fillStyle=color;ctx.fillText(v,x,y)}
  function wrap(v,max){const words=v.split(' '),out=[];let row='';for(const word of words){const t=row?`${row} ${word}`:word;if(ctx.measureText(t).width>max&&row){out.push(row);row=word}else row=t}if(row)out.push(row);return out}
  function drawWrapped(v,x,y,max,size,color=COLORS.ink,gap=size+6,weight=700){ctx.font=`${weight} ${size}px Inter, ui-sans-serif, system-ui, sans-serif`;wrap(v,max).forEach((row,i)=>text(row,x,y+i*gap,size,color,'center',weight))}
  function button(label,x,y,w,h,fill=COLORS.ink,color='#fff',active=false){rounded(x,y,w,h,18,active?COLORS.gold:fill);text(label,x+w/2,y+h/2+7,18,active?COLORS.ink:color,'center',800)}
  function drawIdol(type,x,y,s=1,gray=false){
    const c=gray?'#b9b1a8':IDOLS[type].color,dark=gray?'#8f8881':COLORS.ink;ctx.save();ctx.translate(x,y);ctx.scale(s,s);
    ctx.fillStyle=gray?'#e0dbd5':'#fff7df';ctx.beginPath();ctx.arc(0,0,28,0,Math.PI*2);ctx.fill();ctx.strokeStyle=c;ctx.lineWidth=5;ctx.stroke();
    ctx.fillStyle=c;ctx.strokeStyle=dark;ctx.lineWidth=3;
    if(type==='logic'){ctx.beginPath();ctx.moveTo(-16,10);ctx.lineTo(0,-18);ctx.lineTo(16,10);ctx.lineTo(5,5);ctx.lineTo(0,18);ctx.lineTo(-5,5);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(-15,-2);ctx.lineTo(-28,-13);ctx.lineTo(-9,1);ctx.moveTo(15,-2);ctx.lineTo(28,-13);ctx.lineTo(9,1);ctx.stroke()}
    else if(type==='memory'){ctx.beginPath();ctx.moveTo(-21,4);ctx.bezierCurveTo(-12,-17,2,-17,8,-3);ctx.bezierCurveTo(14,11,23,10,24,-5);ctx.strokeStyle=c;ctx.lineWidth=8;ctx.stroke();ctx.fillStyle=dark;ctx.beginPath();ctx.arc(-18,1,3,0,Math.PI*2);ctx.fill()}
    else if(type==='trivia'){ctx.beginPath();ctx.arc(0,-2,15,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff7df';ctx.beginPath();ctx.arc(-6,-5,4,0,Math.PI*2);ctx.arc(6,-5,4,0,Math.PI*2);ctx.fill();ctx.fillStyle=dark;ctx.beginPath();ctx.arc(-6,-5,2,0,Math.PI*2);ctx.arc(6,-5,2,0,Math.PI*2);ctx.fill();ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(-12,10);ctx.lineTo(0,22);ctx.lineTo(12,10);ctx.fill()}
    else if(type==='platformer'){ctx.beginPath();ctx.moveTo(-19,15);ctx.lineTo(-14,-10);ctx.lineTo(-5,-20);ctx.lineTo(0,-7);ctx.lineTo(8,-20);ctx.lineTo(16,-9);ctx.lineTo(20,14);ctx.lineTo(4,20);ctx.lineTo(-10,20);ctx.closePath();ctx.fill();ctx.fillStyle='#fff7df';ctx.beginPath();ctx.arc(-7,0,3,0,Math.PI*2);ctx.arc(7,0,3,0,Math.PI*2);ctx.fill()}
    else{ctx.beginPath();ctx.arc(0,0,14,0,Math.PI*2);ctx.fill();for(let i=0;i<8;i++){const a=i*Math.PI/4;ctx.beginPath();ctx.moveTo(Math.cos(a)*18,Math.sin(a)*18);ctx.lineTo(Math.cos(a)*26,Math.sin(a)*26);ctx.strokeStyle=c;ctx.lineWidth=5;ctx.stroke()}}
    ctx.restore()
  }
  function setAnim(anim){state.character.anim=anim;state.character.animStarted=state.clock}
  function currentType(){return DAY.order[Math.min(state.roomIndex,4)]}

  function drawBackdrop(type){
    ctx.fillStyle=COLORS.cream;ctx.fillRect(0,0,W,H);
    const c=META[type]?.color||COLORS.gold;
    ctx.fillStyle=c;ctx.globalAlpha=.12;ctx.beginPath();ctx.arc(500,165,170,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
    // Minimal temple skyline.
    ctx.fillStyle='#d8cdbf';ctx.fillRect(0,540,W,360);
    ctx.fillStyle='#c7b7a6';ctx.beginPath();ctx.moveTo(0,540);ctx.lineTo(180,330);ctx.lineTo(300,540);ctx.fill();ctx.beginPath();ctx.moveTo(250,540);ctx.lineTo(430,270);ctx.lineTo(600,540);ctx.fill();
    ctx.fillStyle='#b7a18c';ctx.fillRect(36,260,56,300);ctx.fillRect(508,260,56,300);ctx.fillRect(22,245,84,24);ctx.fillRect(494,245,84,24);
    if(type==='memory'){for(let r=45;r<170;r+=38){ctx.beginPath();ctx.arc(300,350,r,Math.PI,Math.PI*2);ctx.strokeStyle=COLORS.plum;ctx.lineWidth=8;ctx.globalAlpha=.18;ctx.stroke()}ctx.globalAlpha=1}
    if(type==='trivia'){for(let i=0;i<4;i++){rounded(110+i*100,295,70,90,8,'#fff7df');line(125+i*100,325,165+i*100,325,COLORS.teal,5)}}
    if(type==='platformer'){ctx.fillStyle='#91c9c3';ctx.beginPath();ctx.moveTo(0,460);ctx.lineTo(130,350);ctx.lineTo(250,460);ctx.lineTo(400,310);ctx.lineTo(600,460);ctx.fill()}
    if(type==='finale'){ctx.fillStyle=COLORS.gold;ctx.beginPath();ctx.arc(300,340,92,0,Math.PI*2);ctx.fill();for(let i=0;i<12;i++){const a=i*Math.PI/6;line(300+Math.cos(a)*110,340+Math.sin(a)*110,300+Math.cos(a)*145,340+Math.sin(a)*145,COLORS.gold,10)}}
  }
  function drawCharacter(x=90,y=570){
    const t=elapsed(state.character.animStarted),a=state.character.anim;let dy=0,dx=0;
    if(a==='walk'||a==='run')dy=Math.sin(t/90)*5;if(a==='jump'||a==='celebrate')dy=-Math.abs(Math.sin(Math.min(1,t/700)*Math.PI))*42;
    if(a==='fall')dy=Math.min(180,t*.12);if(a==='blast')dx=Math.min(220,t*.15);if(a==='crushed')dy=Math.min(30,t*.04);
    ctx.fillStyle='#263548';ctx.beginPath();ctx.ellipse(x,y+35,34,10,0,0,Math.PI*2);ctx.fill();
    rounded(x-24+dx,y-32+dy,48,65,20,'#de8b4e');rounded(x-19+dx,y-70+dy,38,40,18,'#bd7145');
    rounded(x-30+dx,y-80+dy,60,13,7,'#8a553d');rounded(x-17+dx,y-95+dy,34,20,8,'#9b6244');
    ctx.fillStyle=COLORS.ink;ctx.beginPath();ctx.arc(x-7+dx,y-54+dy,3,0,Math.PI*2);ctx.arc(x+8+dx,y-54+dy,3,0,Math.PI*2);ctx.fill();
    if(a==='burn'){ctx.fillStyle=COLORS.coral;ctx.beginPath();ctx.moveTo(x-15,y-95);ctx.lineTo(x,y-135);ctx.lineTo(x+12,y-95);ctx.fill()}
    if(a==='shadow'){ctx.globalAlpha=.55;rounded(x-35,y-120,70,170,35,COLORS.plum);ctx.globalAlpha=1}
  }
  function drawHUD(){
    rounded(18,18,564,76,24,COLORS.paper);text(`DAY 1 · ${DAY.title}`,38,48,13,COLORS.ink);text(state.testing?'TEST MODE':state.official?'OFFICIAL RUN':`RETRY ${state.attempt}`,38,72,12,state.testing?COLORS.coral:'#72808c');
    DAY.order.forEach((type,i)=>{const x=372+i*39;drawIdol(type,x,56,.52,!state.results[i]);if(i===state.roomIndex&&!state.results[i]){ctx.strokeStyle=META[type].color;ctx.lineWidth=3;ctx.beginPath();ctx.arc(x,56,18,0,Math.PI*2);ctx.stroke()}})
  }
  function drawTitle(type,sub=''){drawHUD();text(META[type].name,30,136,25,COLORS.ink);text(sub||META[type].kicker,30,162,13,META[type].color);button('CLUES',446,112,124,52,'#e7dfd5',COLORS.ink)}

  function drawStart(){
    drawBackdrop('finale');ctx.fillStyle='#ffffffd9';ctx.fillRect(0,0,W,H);
    rounded(24,24,552,852,34,COLORS.paper);rounded(54,60,492,12,6,COLORS.gold);
    text('FIVE ROOMS',54,132,48,COLORS.ink);text(DAY.title,56,171,19,COLORS.coral);text('THE ECLIPSE TRIAL',56,202,13,'#7b8791');
    drawWrapped('Recover five sacred idols and return sunlight to the ancient temple.',300,270,470,22,COLORS.ink,31,700);
    DAY.order.forEach((type,i)=>{drawIdol(type,105+i*98,376,.82,false);text(`${i+1}`,105+i*98,425,12,'#7b8791','center')});
    button('BEGIN FULL EXPEDITION',72,472,456,72,COLORS.ink);
    text('TEMPORARY ROOM TESTING',300,590,13,COLORS.coral,'center',800);text('Jump directly to any room:',300,617,13,'#7b8791','center',600);
    DAY.order.forEach((type,i)=>{const x=50+i*103;rounded(x,642,88,92,20,'#eee7de');drawIdol(type,x+44,676,.62,false);text(`${i+1}`,x+44,719,12,COLORS.ink,'center')});
    text('Tap to play · portrait mode optimized',300,790,13,'#7b8791','center');text(`BEST ${state.stats.best||0}/5  ·  ATTEMPTS ${state.stats.attempts||0}`,300,826,13,COLORS.coral,'center');
  }
  function drawTransition(){drawBackdrop(currentType());drawHUD();const p=clamp(elapsed(state.modeStarted)/(state.reducedMotion?200:800),0,1);drawCharacter(80+p*430,610);rounded(56,650,488,120,26,'#ffffffed');text(`ROOM ${state.roomIndex+1}`,300,690,14,META[currentType()].color,'center');text(META[currentType()].name,300,732,27,COLORS.ink,'center')}
  function drawReady(){
    const type=currentType();drawBackdrop(type);drawHUD();rounded(32,132,536,680,32,'#fffffff2');text(META[type].kicker.toUpperCase(),300,190,14,META[type].color,'center');text(META[type].name,300,236,30,COLORS.ink,'center');
    drawIdol(type,300,340,1.45,false);text(IDOLS[type].name.toUpperCase(),300,410,13,META[type].color,'center');drawWrapped(META[type].brief,300,510,440,20,COLORS.ink,29,650);
    if(type==='platformer'){rounded(78,610,444,54,18,'#f6e4de');text('30 SEC · AUTO-RUN · ONE JUMP BUTTON',300,643,14,COLORS.coral,'center',800)}
    button('READY',82,704,436,78,META[type].color);text('The room starts only when you are ready.',300,835,13,'#7b8791','center');
  }
  function drawInfo(){const type=currentType();ctx.fillStyle='#17202ab8';ctx.fillRect(0,0,W,H);rounded(38,178,524,544,32,COLORS.paper);drawIdol(type,300,246,1.05,false);text(type==='logic'?'CLUES':'ROOM INFO',300,324,15,META[type].color,'center');INFO[type].forEach((v,i)=>{rounded(70,358+i*66,460,52,16,i===0?'#f0e8de':'#f7f3eb');text(i===0?v:`• ${v}`,94,390+i*66,15,COLORS.ink,'left',i===0?800:650)});button('BACK TO ROOM',100,642,400,62,COLORS.ink)}
  function drawLogic(){
    drawBackdrop('logic');drawTitle('logic','Arrange the idols from left to right.');
    rounded(24,188,552,126,26,COLORS.paper);text('BUILD THE BRIDGE',300,226,14,COLORS.coral,'center');drawWrapped('Tap CLUES whenever you need the temple inscriptions.',300,264,470,16,COLORS.ink,23,650);
    for(let i=0;i<4;i++){rounded(28+i*143,342,128,92,20,state.logic.selected[i]==null?'#eee6dc':'#fff1cc');text(state.logic.selected[i]==null?`${i+1}`:ICONS[state.logic.selected[i]],92+i*143,400,34,state.logic.selected[i]==null?'#a3978a':COLORS.ink,'center')}
    for(let i=0;i<4;i++){const col=i%2,row=Math.floor(i/2);button(`${ICONS[i]}  ${NAMES[i]}`,30+col*285,472+row*88,255,70,state.logic.selected.includes(i)?'#d9cbbf':COLORS.coral,'#fff',state.logic.selected.includes(i))}
    button('RESET',30,678,180,66,'#ded4c9',COLORS.ink);button('CONFIRM ORDER',230,678,340,66,COLORS.ink,'#fff',state.logic.selected.length===4);drawCharacter(92,845)
  }
  function memoryLit(){const seq=memoryRounds[state.memory.round],i=Math.floor(elapsed(state.memory.phaseStarted)/650);return i<seq.length?seq[i]:-1}
  function drawMemory(){
    drawBackdrop('memory');drawTitle('memory',`Sequence ${state.memory.round+1} of 2`);const seq=memoryRounds[state.memory.round],show=state.memory.phase==='show',lit=show?memoryLit():-1;
    rounded(24,190,552,190,28,COLORS.paper);text(show?'WATCH THE RUNES':`REPEAT THE ECHO · ${state.memory.input.length}/${seq.length}`,300,230,16,COLORS.plum,'center');
    const slotW=seq.length===4?88:70,start=(W-(seq.length*slotW+(seq.length-1)*10))/2;
    seq.forEach((v,i)=>{const entered=!show&&i<state.memory.input.length;rounded(start+i*(slotW+10),266,slotW,82,20,lit===v?'#ffdf83':entered?'#c8baf2':'#eee8f8');const visible=show?(i<=Math.floor(elapsed(state.memory.phaseStarted)/650)?ICONS[v]:'•'):(entered?ICONS[v]:'•');text(visible,start+i*(slotW+10)+slotW/2,320,34,lit===v?COLORS.ink:COLORS.plum,'center')});
    for(let i=0;i<4;i++){const col=i%2,row=Math.floor(i/2),x=30+col*285,y=430+row*124;rounded(x,y,255,104,20,COLORS.plum);text(ICONS[i],x+127.5,y+47,34,'#fff','center',800);text(NAMES[i],x+127.5,y+78,14,'#fff','center',800)}
    text(show?'Watch carefully…':'Correct choices stay visible above.',300,690,15,'#6f6682','center');button(state.memory.replayUsed?'REPLAY USED':'REPLAY ONCE',135,722,330,60,state.memory.replayUsed?'#d8d0df':COLORS.ink);drawCharacter(86,852)
  }
  function drawTrivia(){
    drawBackdrop('trivia');drawTitle('trivia',`Question ${Math.min(state.trivia.index+1,4)} of 4`);const q=trivia[Math.min(state.trivia.index,3)];
    rounded(24,188,552,182,28,COLORS.paper);drawWrapped(q.q,300,245,490,21,COLORS.ink,30,750);
    q.a.forEach((v,i)=>button(`${i+1}. ${v}`,32,400+i*82,536,66,state.trivia.selected===i?COLORS.gold:'#ffffff',state.trivia.selected===i?COLORS.ink:COLORS.ink));
    rounded(32,750,536,18,9,'#dfd7cd');rounded(32,750,536*((state.trivia.index)/4),18,9,COLORS.teal);text('All four answers must be correct.',300,812,14,'#607179','center');drawCharacter(80,855)
  }
  function jumpHeight(){if(state.platformer.jumpStarted<0)return 0;const p=elapsed(state.platformer.jumpStarted)/900;if(p>=1)return 0;return Math.sin(p*Math.PI)*105}
  function platformElapsed(){return state.platformer.phase==='running'?elapsed(state.platformer.runStarted):0}
  function drawPlatformer(){
    drawBackdrop('platformer');drawTitle('platformer','Auto-run for 30 seconds · tap only to jump');const p=state.platformer,e=platformElapsed(),left=Math.max(0,30000-e);
    rounded(24,184,552,470,28,'#f5e9d8');
    // Scrolling course.
    ctx.save();ctx.beginPath();ctx.roundRect(24,184,552,470,28);ctx.clip();
    ctx.fillStyle='#d8eee9';ctx.fillRect(24,184,552,470);ctx.fillStyle='#a5d2ca';ctx.beginPath();ctx.moveTo(24,520);ctx.lineTo(170,340);ctx.lineTo(300,520);ctx.lineTo(455,300);ctx.lineTo(576,520);ctx.fill();
    ctx.fillStyle='#d0b17a';ctx.fillRect(24,540,552,114);for(let x=-((e*.16)%90);x<620;x+=90)line(x,590,x+50,540,'#b99560',4);
    obstacleTimes.forEach((time,i)=>{if(p.checked[i])return;const x=130+(time-e)*.16;if(x>-60&&x<630){const c=i%2?COLORS.coral:'#5f5147';ctx.fillStyle='#8d745f55';ctx.beginPath();ctx.ellipse(x+24,548,38,10,0,0,Math.PI*2);ctx.fill();if(i%3===0){rounded(x,450,48,90,10,c);rounded(x-8,438,64,20,9,c);line(x+12,466,x+36,520,'#f2c46d',6)}else{ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x-12,540);ctx.lineTo(x+8,468);ctx.lineTo(x+25,540);ctx.lineTo(x+43,482);ctx.lineTo(x+62,540);ctx.closePath();ctx.fill();line(x+8,490,x+25,528,'#f2c46d',5)}}});
    drawCharacter(120,536-jumpHeight());ctx.restore();
    rounded(46,206,508,58,20,'#ffffffd9');text(p.phase==='countdown'?'GET READY':`${Math.ceil(left/1000)} SECONDS`,300,243,18,p.phase==='countdown'?COLORS.coral:COLORS.ink,'center');
    if(p.phase==='countdown'){const n=Math.max(1,3-Math.floor(elapsed(p.countdownStarted)/1000));text(`${n}`,300,430,96,COLORS.coral,'center',850)}
    rounded(40,680,520,18,9,'#dfd4c5');rounded(40,680,520*clamp(e/30000,0,1),18,9,COLORS.coral);
    button(p.phase==='countdown'?'WAIT…':'JUMP',60,724,480,96,p.phase==='countdown'?'#c9bcae':COLORS.ink);text(`${p.checked.length}/${obstacleTimes.length} obstacles cleared`,300,848,14,'#68757b','center')
  }
  function drawFinale(){
    drawBackdrop('finale');drawTitle('finale','Combine every lesson to awaken the Sunstone.');const f=state.finale;rounded(24,450,552,360,30,COLORS.paper);
    if(f.phase==='question'){drawWrapped('Where does the sun rise?',300,500,500,24,COLORS.ink,30,800);['NORTH','EAST','SOUTH','WEST'].forEach((v,i)=>button(`${i+1}. ${v}`,40+(i%2)*270,570+Math.floor(i/2)*88,250,70,COLORS.gold,COLORS.ink))}
    else if(f.phase==='runes'){text('ORDER: DAWN → ZENITH → DUSK',300,500,18,COLORS.ink,'center');['DAWN','ZENITH','DUSK','ECLIPSE'].forEach((v,i)=>button(`${ICONS[i]} ${v}`,40+(i%2)*270,545+Math.floor(i/2)*82,250,64,f.selected.includes(i)?COLORS.gold:'#eee5d8',COLORS.ink));button('CONFIRM',140,720,320,60,COLORS.ink)}
    else if(f.phase==='memory'){text('REPEAT THE FIRST 3 ECHOES',300,500,18,COLORS.ink,'center');ICONS.forEach((v,i)=>button(`${v} ${NAMES[i]}`,40+(i%2)*270,550+Math.floor(i/2)*82,250,64,COLORS.plum));text(`${f.input.length}/3 restored`,300,735,15,'#6b617c','center')}
    else {text(f.phase==='reactionActive'?'TAP NOW!':'WAIT FOR THE SUNBEAM',300,540,24,f.phase==='reactionActive'?COLORS.coral:COLORS.ink,'center');button(f.phase==='reactionActive'?'AWAKEN':'WAIT…',90,620,420,100,f.phase==='reactionActive'?COLORS.gold:'#d8cec1',COLORS.ink)}
    drawCharacter(82,850)
  }
  function drawRoom(){const t=currentType();if(t==='logic')drawLogic();else if(t==='memory')drawMemory();else if(t==='trivia')drawTrivia();else if(t==='platformer')drawPlatformer();else drawFinale()}
  function drawSuccess(){const type=currentType(),e=elapsed(state.modeStarted);drawBackdrop(type);drawHUD();text('IDOL RECOVERED',300,158,15,META[type].color,'center');text(IDOLS[type].name,300,198,30,COLORS.ink,'center');rounded(28,238,544,470,30,'#ffffffd9');line(54,610,546,610,'#c9b59e',8);let x=90;if(e<650)x=90+210*clamp(e/650,0,1);else if(e>1080)x=300+260*clamp((e-1080)/700,0,1);drawCharacter(x,585);if(e<1080){const grab=clamp((e-650)/430,0,1),s=1.55*(1-grab*.68);drawIdol(type,350-45*grab,480-45*grab,s,false)}else drawIdol(type,x,515,.48,false);text(e<650?'THE IDOL APPEARS':e<1080?'COLLECTING…':state.roomIndex===4?'THE SUNSTONE AWAKENS':'ONWARD TO THE NEXT ROOM',300,666,14,META[type].color,'center');text(state.message,300,760,14,'#64727a','center')}
  function drawFail(){drawBackdrop(currentType());drawHUD();ctx.fillStyle='#c9404033';ctx.fillRect(0,0,W,H);drawCharacter(300,570);drawWrapped(state.detail,300,210,500,22,COLORS.red,30,800)}
  function drawEnd(victory){drawBackdrop(victory?'finale':currentType());ctx.fillStyle='#ffffffdd';ctx.fillRect(0,0,W,H);rounded(26,50,548,800,34,COLORS.paper);text(victory?'THE SUN RETURNS':'EXPEDITION ENDED',300,145,34,victory?COLORS.gold:COLORS.red,'center');drawCharacter(300,330);text(`${state.score}/5 IDOLS`,300,470,24,COLORS.ink,'center');DAY.order.forEach((type,i)=>drawIdol(type,104+i*98,530,.68,!state.results[i]));button('RETRY DAY 1',70,635,460,76,COLORS.ink);button('COPY RESULT',70,730,460,66,'#e5ddd3',COLORS.ink);text('Your shared result contains no answers.',300,820,13,'#78838a','center')}
  function render(){ctx.clearRect(0,0,W,H);if(state.mode==='start')drawStart();else if(state.mode==='transition')drawTransition();else if(state.mode==='ready')drawReady();else if(state.mode==='room')drawRoom();else if(state.mode==='success')drawSuccess();else if(state.mode==='fail')drawFail();else if(state.mode==='gameover')drawEnd(false);else drawEnd(true);if(state.infoOpen)drawInfo()}

  function resetPuzzles(){state.logic={selected:[]};state.memory={round:0,phase:'show',phaseStarted:state.clock,input:[],replayUsed:false};state.trivia={index:0,selected:-1};state.platformer={phase:'countdown',countdownStarted:0,runStarted:0,jumpStarted:-1,checked:[],distance:0};state.finale={phase:'question',selected:[],input:[],readyAt:0,activeAt:0};state.infoOpen=false}
  function startRun(retry=false,startRoom=0,testing=false){state.mode='transition';state.modeStarted=state.clock;state.roomIndex=startRoom;state.score=0;state.results=[];state.message='';state.detail='';state.testing=testing;if(retry){state.attempt++;state.official=false}else{state.attempt=1;state.official=!testing}resetPuzzles();setAnim('walk');render()}
  function showReady(){state.mode='ready';state.modeStarted=state.clock;setAnim('idle');render()}
  function enterRoom(){state.mode='room';state.modeStarted=state.clock;const t=currentType();if(t==='memory'){state.memory.phase='show';state.memory.phaseStarted=state.clock}if(t==='platformer'){state.platformer.phase='countdown';state.platformer.countdownStarted=state.clock;state.platformer.runStarted=0;state.platformer.checked=[]}render()}
  function success(message){if(state.mode!=='room')return;state.results[state.roomIndex]=true;state.score++;state.message=message;state.mode='success';state.modeStarted=state.clock;setAnim('walk');render()}
  function fail(anim,detail){if(state.mode!=='room')return;state.results[state.roomIndex]=false;state.detail=detail;state.mode='fail';state.modeStarted=state.clock;setAnim(anim);render()}
  function nextRoom(){state.roomIndex++;state.mode='transition';state.modeStarted=state.clock;setAnim('walk');render()}
  function chooseLogic(i){if(state.logic.selected.includes(i)||state.logic.selected.length>=4)return;state.logic.selected.push(i);setAnim('interact');render()}
  function confirmLogic(){if(state.logic.selected.length<4)return;if([0,1,2,3].every((v,i)=>state.logic.selected[i]===v))success('The bridge rises from the sand.');else fail('burn','The Serpent Idol breathes sacred fire!')}
  function chooseMemory(i){if(state.memory.phase!=='input')return;const seq=memoryRounds[state.memory.round],pos=state.memory.input.length;if(i!==seq[pos])return fail('shadow','A wrong echo wakes the chamber shadows.');state.memory.input.push(i);if(state.memory.input.length===seq.length){if(state.memory.round===0){state.memory.round=1;state.memory.phase='pause';state.memory.phaseStarted=state.clock;state.memory.input=[];state.memory.replayUsed=false}else success('Both echo patterns return perfectly.')}render()}
  function replayMemory(){if(state.memory.phase!=='input'||state.memory.replayUsed)return;state.memory.phase='show';state.memory.phaseStarted=state.clock;state.memory.input=[];state.memory.replayUsed=true;render()}
  function chooseTrivia(i){const t=trivia[state.trivia.index];state.trivia.selected=i;if(i!==t.correct)return fail('fall','The incorrect tablet opens a hidden trap.');state.trivia.index++;state.trivia.selected=-1;if(state.trivia.index>=trivia.length)success('Four answers reveal the archive seal.');else{state.message='Correct';setAnim('celebrate')}render()}
  function doJump(){const p=state.platformer;if(currentType()==='platformer'){if(p.phase!=='running')return;if(p.jumpStarted<0||elapsed(p.jumpStarted)>=900){p.jumpStarted=state.clock;setAnim('jump')}return}const f=state.finale;if(currentType()==='finale'){if(f.phase==='reactionWaiting')return fail('blast','The Sunstone rejects the early strike.');if(f.phase==='reactionActive')return success('The Sunstone awakens and daylight returns!')}}
  function chooseFinale(i){const f=state.finale;if(f.phase==='question'){if(i!==1)return fail('blast','The guardian rejects that direction.');f.phase='runes';f.selected=[]}else if(f.phase==='runes'){if(!f.selected.includes(i)&&f.selected.length<3)f.selected.push(i)}else if(f.phase==='memory'){const seq=[0,2,1],pos=f.input.length;if(i!==seq[pos])return fail('shadow','The final echo fractures the seal.');f.input.push(i);if(f.input.length===3){f.phase='reactionWaiting';f.readyAt=state.clock+1300}}render()}
  function confirmFinale(){const f=state.finale;if(f.phase!=='runes'||f.selected.length!==3)return;if([0,1,2].every((v,i)=>f.selected[i]===v)){f.phase='memory';f.input=[];f.selected=[]}else fail('burn','The solar cycle ignites the guardian.');render()}

  function updatePlatformer(){const p=state.platformer;if(p.phase==='countdown'){if(elapsed(p.countdownStarted)>=3000){p.phase='running';p.runStarted=state.clock;setAnim('run')}return}const e=platformElapsed();if(p.jumpStarted>=0&&elapsed(p.jumpStarted)>=900)p.jumpStarted=-1;obstacleTimes.forEach((time,i)=>{if(p.checked[i]||e<time)return;const h=jumpHeight();if(h<46)fail('crushed','The explorer collides with a temple obstacle.');else p.checked[i]=true});if(state.mode==='room'&&e>=30000)success('Thirty seconds survived. The passage seal is yours.')}
  function pauseTimers(ms){state.modeStarted+=ms;state.character.animStarted+=ms;state.memory.phaseStarted+=ms;if(state.platformer.countdownStarted)state.platformer.countdownStarted+=ms;if(state.platformer.runStarted)state.platformer.runStarted+=ms;if(state.platformer.jumpStarted>=0)state.platformer.jumpStarted+=ms;if(state.finale.readyAt)state.finale.readyAt+=ms;if(state.finale.activeAt)state.finale.activeAt+=ms}
  function update(ms){state.clock+=ms;if(state.infoOpen){pauseTimers(ms);return}if(state.mode==='transition'&&elapsed(state.modeStarted)>=(state.reducedMotion?150:800))showReady();if(state.mode==='success'&&elapsed(state.modeStarted)>=(state.reducedMotion?650:1900)){if(state.roomIndex===4){state.mode='victory';setAnim('celebrate');saveRun(true)}else nextRoom()}if(state.mode==='fail'&&elapsed(state.modeStarted)>=(state.reducedMotion?300:1200)){state.mode='gameover';saveRun(false)}if(state.mode!=='room')return;
    if(currentType()==='memory'){const m=state.memory,seq=memoryRounds[m.round];if(m.phase==='show'&&elapsed(m.phaseStarted)>=seq.length*650+400){m.phase='input';m.input=[]}if(m.phase==='pause'&&elapsed(m.phaseStarted)>=800){m.phase='show';m.phaseStarted=state.clock}}
    if(currentType()==='platformer')updatePlatformer();if(currentType()==='finale'){const f=state.finale;if(f.phase==='reactionWaiting'&&state.clock>=f.readyAt){f.phase='reactionActive';f.activeAt=state.clock}if(f.phase==='reactionActive'&&elapsed(f.activeAt)>1100)fail('blast','The final sunbeam fades away.')}}
  function point(event){const r=canvas.getBoundingClientRect();return{x:(event.clientX-r.left)*W/r.width,y:(event.clientY-r.top)*H/r.height}}
  function roomTap(x,y){const t=currentType();if(x>=420&&y>=100&&y<=180){state.infoOpen=true;return render()}if(t==='logic'){if(y>=450&&y<=650){const col=x<300?0:1,row=y<560?0:1;return chooseLogic(row*2+col)}if(y>=650&&x<220){state.logic.selected=[];return render()}if(y>=650)return confirmLogic()}
    if(t==='memory'){if(y>=410&&y<=680){const col=x<300?0:1,row=y<552?0:1;return chooseMemory(row*2+col)}if(y>=700)return replayMemory()}
    if(t==='trivia'&&y>=380&&y<=750)return chooseTrivia(clamp(Math.floor((y-400)/82),0,3));if(t==='platformer'&&y>=680)return doJump();
    if(t==='finale'){const f=state.finale;if(f.phase==='question'&&y>=540){const col=x<300?0:1,row=y<658?0:1;return chooseFinale(row*2+col)}if(f.phase==='runes'&&y>=520&&y<710){const col=x<300?0:1,row=y<627?0:1;return chooseFinale(row*2+col)}if(f.phase==='runes'&&y>=700)return confirmFinale();if(f.phase==='memory'&&y>=530){const col=x<300?0:1,row=y<650?0:1;return chooseFinale(row*2+col)}if(f.phase.startsWith('reaction')&&y>=590)return doJump()}}
  function handlePointer(event){const{x,y}=point(event);if(state.infoOpen){if(y>=620){state.infoOpen=false;return render()}return}if(state.mode==='start'){if(y>=620&&y<=760){const i=clamp(Math.floor((x-50)/103),0,4);return startRun(false,i,true)}if(y>=440&&y<590)return startRun(false,0,false);return}if(state.mode==='ready'&&y>=680)return enterRoom();if(state.mode==='room')return roomTap(x,y);if((state.mode==='gameover'||state.mode==='victory')&&y>=610&&y<720)return startRun(true,0,false);if((state.mode==='gameover'||state.mode==='victory')&&y>=720)navigator.clipboard?.writeText(shareText())}
  function handleKey(event){if(event.key.toLowerCase()==='f')return document.fullscreenElement?document.exitFullscreen():canvas.requestFullscreen();if(state.infoOpen){if(['Escape','Enter'].includes(event.key)){state.infoOpen=false;render()}return}if(state.mode==='start'&&event.key==='Enter')return startRun(false,0,false);if(state.mode==='ready'&&event.key==='Enter')return enterRoom();if((state.mode==='gameover'||state.mode==='victory')&&['r','R','Enter'].includes(event.key))return startRun(true,0,false);if(state.mode!=='room')return;if(event.key===' '){event.preventDefault();return doJump()}if(currentType()==='logic'&&event.key==='Enter')return confirmLogic();if(currentType()==='finale'&&event.key==='Enter')return confirmFinale();if(['1','2','3','4'].includes(event.key)){const i=Number(event.key)-1;if(currentType()==='logic')chooseLogic(i);else if(currentType()==='memory')chooseMemory(i);else if(currentType()==='trivia')chooseTrivia(i);else if(currentType()==='finale')chooseFinale(i)}}
  function shareText(){return`FIVE ROOMS · DAY 1\n🏺 ${DAY.title}\n${state.results.map(v=>v?'🟨':'🟥').join('')}\n${state.score}/5 seals`}
  window.advanceTime=(ms)=>{manualTime=true;const n=Math.max(1,Math.round(ms/(1000/60)));for(let i=0;i<n;i++)update(ms/n);render()};
  window.render_game_to_text=()=>JSON.stringify({coordinateSystem:'portrait canvas 600x900; origin top-left',day:DAY.id,mode:state.mode,room:state.roomIndex+1,roomType:currentType(),score:state.score,results:state.results,attempt:state.attempt,official:state.official,testing:state.testing,infoOpen:state.infoOpen,collected:DAY.order.filter((_,i)=>state.results[i]),character:{animation:state.character.anim},puzzle:currentType()==='logic'?{selected:state.logic.selected}:currentType()==='memory'?{round:state.memory.round+1,phase:state.memory.phase,inputLength:state.memory.input.length,replayAvailable:!state.memory.replayUsed}:currentType()==='trivia'?{question:state.trivia.index+1,total:4}:currentType()==='platformer'?{phase:state.platformer.phase,elapsedMs:Math.round(platformElapsed()),obstaclesCleared:state.platformer.checked.length,totalObstacles:obstacleTimes.length,jumping:jumpHeight()>0}:{phase:state.finale.phase,inputLength:state.finale.input.length,selected:state.finale.selected},controls:'Tap; 1-4 choose; Enter ready/confirm; Space jumps; F fullscreen'});
  canvas.addEventListener('pointerup',handlePointer);window.addEventListener('keydown',handleKey);setInterval(()=>{if(!manualTime){update(50);render()}},50);state.stats=loadStats();render();
})();
</script>
